<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunil Kumar Elumalai - Python Developer & DevOps Engineer</title>
    <meta name="description"
        content="Personal landing page for Sunil Kumar Elumalai, Python Developer & DevOps Engineer.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            /* Sleek dark mode background */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        .container {
            padding: 2rem;
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.05em;
            /* Subtle gradient text for a premium feel */
            background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: clamp(1.2rem, 2.5vw, 1.75rem);
            font-weight: 300;
            margin: 0;
            color: #94a3b8;
            letter-spacing: 0.02em;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>Sunil Kumar Elumalai</h1>
        <h2>Python Developer &amp; DevOps Engineer</h2>
    </main>
</body>

</html>
